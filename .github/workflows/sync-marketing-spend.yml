name: Sync Marketing Spend (Meta)

# Pulls monthly Meta Ads spend from the 3 Wisewell accounts and writes
# the full historical series to the "Marketing Spend - Claude" tab in
# the Wisewell User Base Data Google Sheet.
#
# Phase 1: Meta only. Google Ads will be added once the developer token
# application is approved.

on:
  schedule:
    # GitHub Actions cron is in UTC. UAE is GMT+4.
    # 02:00 UAE = 22:00 UTC (previous day)
    # 13:00 UAE = 09:00 UTC (same day)
    - cron: '0 22 * * *'   # → 02:00 Asia/Dubai
    - cron: '0 9 * * *'    # → 13:00 Asia/Dubai

  # Allow manual triggers from the Actions UI for testing.
  workflow_dispatch:

jobs:
  sync:
    name: Pull Meta spend → Sheet
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests google-api-python-client google-auth

      - name: Run sync_marketing_spend.py
        env:
          META_ACCESS_TOKEN:      ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_UAE:    ${{ secrets.META_AD_ACCOUNT_UAE }}
          META_AD_ACCOUNT_KSA:    ${{ secrets.META_AD_ACCOUNT_KSA }}
          META_AD_ACCOUNT_USA:    ${{ secrets.META_AD_ACCOUNT_USA }}
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
        run: python scripts/sync_marketing_spend.py

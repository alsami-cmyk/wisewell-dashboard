name: Sync Inbound Queries (Freshchat + Freshdesk)

# Refreshes the "Inbound Queries" tab in the Customer Support Google Sheet
# with daily Product Information chat & ticket counts for the trailing 30 days.
#
# Reads the Freshchat Conversation-Created Reports API and the Freshdesk
# Search Tickets API. Writes columns B (chats) and C (tickets) per matching
# date row in the sheet.

on:
  schedule:
    # GitHub Actions cron is in UTC. UAE is GMT+4.
    # 02:00 UAE = 22:00 UTC (previous day)
    # 14:00 UAE = 10:00 UTC (same day)
    - cron: '0 22 * * *'   # → 02:00 Asia/Dubai
    - cron: '0 10 * * *'   # → 14:00 Asia/Dubai

  # Allow manual triggers from the Actions UI for testing.
  workflow_dispatch:

jobs:
  sync:
    name: Pull Freshchat + Freshdesk → Sheet
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests google-api-python-client google-auth

      - name: Run sync_inbound_queries.py
        env:
          FRESHCHAT_API_TOKEN:        ${{ secrets.FRESHCHAT_API_TOKEN }}
          FRESHCHAT_DOMAIN:           ${{ secrets.FRESHCHAT_DOMAIN }}
          FRESHDESK_API_KEY:          ${{ secrets.FRESHDESK_API_KEY }}
          FRESHDESK_DOMAIN:           ${{ secrets.FRESHDESK_DOMAIN }}
          INBOUND_QUERIES_SHEET_ID:   ${{ secrets.INBOUND_QUERIES_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT:     ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
        run: python scripts/sync_inbound_queries.py

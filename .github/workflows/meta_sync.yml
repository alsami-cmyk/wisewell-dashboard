name: Meta Ads Sync

on:
  schedule:
    - cron: "0 4 * * *"   # 08:00 UAE (UTC+4)
    - cron: "0 11 * * *"  # 15:00 UAE (UTC+4)
  workflow_dispatch:       # allow manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install requests google-api-python-client google-auth toml

      - name: Run Meta Ads sync
        env:
          META_ACCESS_TOKEN:      ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_UAE:    ${{ secrets.META_AD_ACCOUNT_UAE }}
          META_AD_ACCOUNT_KSA:    ${{ secrets.META_AD_ACCOUNT_KSA }}
          META_AD_ACCOUNT_USA:    ${{ secrets.META_AD_ACCOUNT_USA }}
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
        run: python scripts/sync_marketing_spend.py

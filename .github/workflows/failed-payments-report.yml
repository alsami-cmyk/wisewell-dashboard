name: Failed Payments Snapshot Report

on:
  # Mon, Wed, Fri at 09:00 UAE time (UTC+4 = 05:00 UTC)
  schedule:
    - cron: "0 5 * * 1,3,5"

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit last_snapshot.json back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run snapshot script
        env:
          RECHARGE_API_KEY: ${{ secrets.RECHARGE_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python scripts/failed_payments_snapshot.py

      - name: Commit updated snapshot
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/last_snapshot.json
          git diff --cached --quiet || git commit -m "chore: update failed payments snapshot [skip ci]"
          git push

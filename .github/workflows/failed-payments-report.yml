name: Failed Payments — Daily Sheet Refresh

on:
  # Daily at 07:00 UAE time (UTC+4 = 03:00 UTC)
  schedule:
    - cron: "0 3 * * *"

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit success_counts.json + last_snapshot.json

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests google-auth google-auth-httplib2

      - name: Run sheet refresh
        env:
          RECHARGE_API_KEY:  ${{ secrets.RECHARGE_API_KEY }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
        run: python scripts/sheet_refresh.py

      - name: Commit updated cache files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/last_snapshot.json scripts/success_counts.json
          git diff --cached --quiet || git commit -m "chore: daily sheet refresh $(date -u +%Y-%m-%d) [skip ci]"
          git push
